<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关键词监控 · Keyword Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .logo {
            font-size: 32px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            color: #1a1a1a;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #4F46E5;
        }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: -12px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #4338CA; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .features {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 16px;
        }

        .feature {
            flex: 1;
            text-align: center;
        }

        .feature-icon { font-size: 20px; margin-bottom: 4px; }

        .feature-text {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔔</div>
        <h1>Keyword Monitor</h1>
        <p class="subtitle">监控 Reddit 和 HackerNews 上的关键词，有新内容时立即邮件通知。</p>

        <label>你的邮箱</label>
        <input type="email" id="email" placeholder="you@example.com">

        <label>监控关键词</label>
        <input type="text" id="keywords" placeholder="solopreneur, indie hacker, ...">
        <p class="hint">多个关键词用逗号分隔</p>

        <button id="btn" onclick="subscribe()">开始监控</button>

        <div class="message" id="message"></div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📡</div>
                <div class="feature-text">每日自动<br>扫描</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✉️</div>
                <div class="feature-text">邮件即时<br>提醒</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Reddit +<br>HackerNews</div>
            </div>
        </div>
    </div>

    <script>
        async function subscribe() {
            const email = document.getElementById("email").value.trim();
            const keywords = document.getElementById("keywords").value.trim();
            const btn = document.getElementById("btn");
            const msg = document.getElementById("message");

            if (!email || !keywords) {
                showMessage("请填写邮箱和关键词", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "提交中...";

            try {
                const res = await fetch("/subscribe", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, keywords })
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage("✅ 订阅成功！有新内容时我们会发邮件通知你。", "success");
                    document.getElementById("email").value = "";
                    document.getElementById("keywords").value = "";
                } else {
                    showMessage(data.error || "出错了，请重试", "error");
                }
            } catch (e) {
                showMessage("网络错误，请重试", "error");
            }

            btn.disabled = false;
            btn.textContent = "开始监控";
        }

        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = "block";
        }
    </script>
</body>
</html>
