<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Monitor · Stay Ahead of the Conversation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .logo { font-size: 32px; margin-bottom: 8px; }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            color: #1a1a1a;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="email"]:focus,
        input[type="text"]:focus { border-color: #4F46E5; }

        .hint {
            font-size: 12px;
            color: #999;
            margin-top: -12px;
            margin-bottom: 16px;
        }

        .platforms {
            margin-bottom: 24px;
        }

        .platform-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .platform-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .platform-option:hover {
            border-color: #4F46E5;
        }

        .platform-option.selected {
            border-color: #4F46E5;
            background: #eef2ff;
        }

        .platform-option input[type="checkbox"] {
            display: none;
        }

        .platform-icon { font-size: 16px; }

        .platform-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #4338CA; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .features {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 16px;
        }

        .feature { flex: 1; text-align: center; }
        .feature-icon { font-size: 20px; margin-bottom: 4px; }
        .feature-text {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔔</div>
        <h1>Keyword Monitor</h1>
        <p class="subtitle">Track keywords on Reddit and HackerNews. Get an email the moment someone mentions what you care about.</p>

        <label>Your Email</label>
        <input type="email" id="email" placeholder="you@example.com">

        <label>Keywords to Monitor</label>
        <input type="text" id="keywords" placeholder="solopreneur, indie hacker, ...">
        <p class="hint">Separate multiple keywords with commas</p>

        <div class="platforms">
            <label>Platforms</label>
            <div class="platform-options">
                <div class="platform-option selected" data-platform="reddit" onclick="togglePlatform(this)">
                    <input type="checkbox" checked>
                    <span class="platform-icon">🟠</span>
                    <span class="platform-name">Reddit</span>
                </div>
                <div class="platform-option selected" data-platform="hackernews" onclick="togglePlatform(this)">
                    <input type="checkbox" checked>
                    <span class="platform-icon">🟡</span>
                    <span class="platform-name">HackerNews</span>
                </div>
                <div class="platform-option" data-platform="devto" onclick="togglePlatform(this)">
                    <input type="checkbox">
                    <span class="platform-icon">👩‍💻</span>
                    <span class="platform-name">DEV.to</span>
                </div>
            </div>
        </div>

        <button id="btn" onclick="subscribe()">Start Monitoring</button>

        <div class="message" id="message"></div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📡</div>
                <div class="feature-text">Daily auto<br>scanning</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✉️</div>
                <div class="feature-text">Instant email<br>alerts</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Reddit +<br>HackerNews</div>
            </div>
        </div>
    </div>

    <script>
        function togglePlatform(el) {
            el.classList.toggle("selected");
            const cb = el.querySelector("input[type='checkbox']");
            cb.checked = !cb.checked;
        }

        function getSelectedPlatforms() {
            const selected = document.querySelectorAll(".platform-option.selected");
            return Array.from(selected).map(el => el.dataset.platform).join(",");
        }

        async function subscribe() {
            const email = document.getElementById("email").value.trim();
            const keywords = document.getElementById("keywords").value.trim();
            const platforms = getSelectedPlatforms();
            const btn = document.getElementById("btn");

            if (!email || !keywords) {
                showMessage("Please enter your email and at least one keyword.", "error");
                return;
            }

            if (!platforms) {
                showMessage("Please select at least one platform.", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Submitting...";

            try {
                const res = await fetch("/subscribe", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, keywords, platforms })
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage("✅ You're subscribed! We'll email you when we find new mentions.", "success");
                    document.getElementById("email").value = "";
                    document.getElementById("keywords").value = "";
                } else if (data.error === "free_limit") {
                    showUpgradePrompt(email);
                } else {
                    showMessage(data.error || "Something went wrong. Please try again.", "error");
                }
            } catch (e) {
                showMessage("Network error. Please try again.", "error");
            }

            btn.disabled = false;
            btn.textContent = "Start Monitoring";
        }

        async function showUpgradePrompt(email) {
            const msg = document.getElementById("message");
            msg.innerHTML = `
                <strong>Free plan allows 1 keyword only.</strong><br>
                Upgrade to Pro ($3/mo) for unlimited keywords.<br><br>
                <button onclick="upgrade('${email}')" style="width:auto;padding:10px 24px;font-size:14px;">
                    ⚡ Upgrade to Pro
                </button>
            `;
            msg.className = "message error";
            msg.style.display = "block";
        }

        async function upgrade(email) {
            const res = await fetch("/checkout", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (data.url) {
                window.location.href = data.url;
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = "block";
        }
    </script>
    <div style="text-align:center; padding:24px; font-size:12px; color:#999;">
    <a href="/tokusho" style="color:#999;">特定商取引法に基づく表記</a>
    </div>
</body>
</html>
